<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sniper Bot Pro | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background-color: #1e1e1e; padding: 2rem; border-radius: 10px; width: 100%; max-width: 400px; }
        .form-control, .form-select { background-color: #2c2c2c; color: white; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4 text-primary">SNIPER BOT PRO</h3>
        
        {% if erro %}
        <div class="alert alert-danger p-2 text-center" style="font-size: 0.9em;">
            {{ erro }}
        </div>
        {% endif %}

        <form method="post">
            <div class="mb-3">
                <label class="form-label">E-mail IQ Option</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Tipo de Conta</label>
                <select name="conta" class="form-select">
                    <option value="PRACTICE">Treinamento (PRACTICE)</option>
                    <option value="REAL">Real (REAL)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">CONECTAR</button>
        </form>
    </div>
</body>
</html>
